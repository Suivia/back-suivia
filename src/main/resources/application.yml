spring:
  application:
    name: back-suivia

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/suivia
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Suivia123!}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

spring.cloud.aws:
  region:
    static: sa-east-1
  credentials:
    use-default-aws-credentials-chain: true

suivia:
  aws:
    s3-bucket: suivia-invoices-raw-dev-unique123
    sqs-queue: suivia-match-queue
