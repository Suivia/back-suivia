spring:
  application:
    name: suivia-core
  datasource:
    url: jdbc:postgresql://localhost:5432/suivia_db
    username: suivia
    password: suivia_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"

# Configurações do Engine de Tolerância
suivia:
  tolerance:
    fuzzy-match-threshold: 85
